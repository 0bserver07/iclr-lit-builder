site_name: lit-builder
site_description: ICLR/NeurIPS literature builder
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
nav:
  - Home: index.md
  - Papers: papers/
  - Topics: topics/
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
